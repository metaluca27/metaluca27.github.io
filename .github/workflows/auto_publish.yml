name: Auto Daily Publish

on:
  schedule:
    # 매일 UTC 00:00 (한국 시간 오전 9시)에 자동으로 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 깃허브 웹 UI에서 수동으로 실행 가능하게 설정

permissions:
  contents: write # 깃허브 액션이 코드를 커밋하고 푸시할 수 있는 권한 부여

jobs:
  publish-post:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 전체를 받아와 푸시 충돌 예방

      # 2. 파이썬 환경 설정
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 필요한 파이썬 라이브러리 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      # 4. 자동 포스팅 생성 및 사이트 빌드 (배포는 건너뜀)
      - name: Run NABE Engine (Build Only)
        env:
          # 대장님이 Secrets(비밀값) 혹은 Variables(환경변수) 중 어느 탭에 등록했든 인식하도록 Fall-back 처리
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || vars.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "[ERROR] GEMINI_API_KEY가 설정되어 있지 않습니다."
            echo "깃허브 설정의 Secrets에 GEMINI_API_KEY 이름으로 등록했는지 확인해 주세요."
            exit 1
          fi
          
          # --build-only 옵션을 주어 글쓰기 및 빌드까지만 수행하고, 깃허브 푸시는 파이썬에서 수행하지 않음
          python main.py --auto --model gemini --build-only

      # 5. 생성된 파일들을 깃허브 보안 토큰 권한으로 안전하게 푸시
      - name: Commit and Push changes
        run: |
          git config --global user.name "metaluca27"
          git config --global user.email "metaluca27@users.noreply.github.com"
          
          git add .
          
          # 변경사항이 있는지 확인 후 커밋 및 푸시
          if ! git diff --quiet --cached; then
            git commit -m "NABE Auto-Publish (GitHub Actions)"
            git push origin main
          else
            echo "No changes to commit."
          fi
